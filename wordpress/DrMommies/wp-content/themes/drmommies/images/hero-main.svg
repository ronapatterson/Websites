<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a3d"/>
      <stop offset="100%" style="stop-color:#3a1d8a"/>
    </linearGradient>
    <linearGradient id="bowl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f5e6"/>
      <stop offset="100%" style="stop-color:#e8e0c0"/>
    </linearGradient>
    <linearGradient id="leaf1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
  </defs>
  <rect width="600" height="500" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="500" cy="80" r="80" fill="rgba(103,61,230,0.3)"/>
  <circle cx="80" cy="400" r="60" fill="rgba(103,61,230,0.2)"/>
  <!-- Bowl shape -->
  <ellipse cx="300" cy="290" rx="160" ry="30" fill="rgba(0,0,0,0.3)"/>
  <path d="M140 220 Q140 350 300 370 Q460 350 460 220 Z" fill="url(#bowl)"/>
  <ellipse cx="300" cy="220" rx="160" ry="28" fill="#f0ebd0"/>
  <!-- Food items in bowl -->
  <!-- Quinoa/grain base -->
  <ellipse cx="300" cy="270" rx="120" ry="18" fill="#d4a843"/>
  <!-- Greens -->
  <ellipse cx="240" cy="250" rx="50" ry="20" fill="#66bb6a" transform="rotate(-20 240 250)"/>
  <ellipse cx="260" cy="245" rx="40" ry="15" fill="#4caf50" transform="rotate(-15 260 245)"/>
  <!-- Chickpeas -->
  <circle cx="330" cy="248" r="10" fill="#d4a843"/>
  <circle cx="345" cy="242" r="9" fill="#c49a35"/>
  <circle cx="318" cy="242" r="8" fill="#d4a843"/>
  <!-- Avocado -->
  <ellipse cx="370" cy="260" rx="25" ry="18" fill="#558b2f"/>
  <ellipse cx="370" cy="260" rx="18" ry="12" fill="#8bc34a"/>
  <ellipse cx="370" cy="260" rx="8" ry="7" fill="#33691e"/>
  <!-- Tomatoes -->
  <circle cx="290" cy="235" r="10" fill="#e53935"/>
  <circle cx="305" cy="230" r="8" fill="#f44336"/>
  <!-- Lemon slice -->
  <circle cx="350" cy="280" r="14" fill="#fff176"/>
  <circle cx="350" cy="280" r="10" fill="#ffee58"/>
  <line x1="336" y1="280" x2="364" y2="280" stroke="#fdd835" stroke-width="1.5"/>
  <line x1="350" y1="266" x2="350" y2="294" stroke="#fdd835" stroke-width="1.5"/>
  <!-- Wooden spoon -->
  <rect x="420" y="180" width="12" height="130" rx="6" fill="#8d6e63" transform="rotate(25 426 245)"/>
  <ellipse cx="403" cy="210" rx="18" ry="12" fill="#a1887f" transform="rotate(25 403 210)"/>
  <!-- Herbs/garnish -->
  <path d="M200 200 Q195 185 205 175 Q210 185 200 200" fill="#43a047"/>
  <path d="M210 195 Q215 178 225 172 Q222 185 210 195" fill="#4caf50"/>
  <!-- Text area -->
  <rect x="100" y="390" width="400" height="80" rx="10" fill="rgba(0,0,0,0.4)"/>
  <text x="300" y="420" text-anchor="middle" fill="#ebe4ff" font-family="Georgia, serif" font-size="18" font-weight="bold">Wholesome Family Meals</text>
  <text x="300" y="448" text-anchor="middle" fill="rgba(235,228,255,0.7)" font-family="Arial, sans-serif" font-size="13">Organic · Nourishing · Delicious</text>
</svg>
